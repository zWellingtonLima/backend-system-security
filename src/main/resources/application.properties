spring.application.name=gestao_seguranca

# Datasource
spring.datasource.url=jdbc:sqlserver://localhost:${DB_PORT:1433};databaseName=${DB_NAME};encrypt=true;trustServerCertificate=true
spring.datasource.username=${USERNAME}
spring.datasource.password=${PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
# JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
#spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
#spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Performance — leitura
spring.jpa.properties.hibernate.default_batch_fetch_size=25

# Performance — escrita
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pool
spring.datasource.hikari.keepalive-time=600000

server.port=${PORT:8080}

# JWT
jwt.secret_key=${JWT_SECRET_KEY}
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS}